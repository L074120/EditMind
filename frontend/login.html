<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditMind - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
        }
    </style>
</head>

<body class="bg-[#0b0d11] text-gray-100 min-h-screen flex flex-col">

    <header class="w-full flex justify-between items-center px-6 md:px-12 py-8 z-20">
        <a href="home.html" class="no-underline hover:scale-105 transition-transform inline-block">
            <h1 class="text-3xl font-black italic tracking-tighter text-white">
                EDIT<span class="text-[#f97316] drop-shadow-[0_0_15px_rgba(249,115,22,0.5)]">MIND</span>
            </h1>
        </a>
        <a href="cadastro.html"
            class="text-xs font-black uppercase tracking-widest text-gray-400 hover:text-white border border-gray-700 hover:border-gray-500 px-5 py-2.5 rounded-full transition-all">
            Criar conta
        </a>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md">

            <div class="glass-panel rounded-[2rem] p-8 md:p-12 border border-gray-800">

                <div class="text-center mb-8">
                    <h2 class="text-2xl md:text-3xl font-black text-white tracking-tight mb-2">
                        Bem-vindo de volta
                    </h2>
                    <p class="text-gray-500 text-sm">Entre para acessar seus projetos</p>
                </div>

                <form id="form-login" class="space-y-5">

                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">
                            Email
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <input type="email" id="email" placeholder="seu@email.com" required
                                class="w-full bg-black/40 border border-gray-800 rounded-xl pl-11 pr-4 py-3.5 text-sm text-white focus:border-[#f97316]/60 outline-none transition-all placeholder-gray-600">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">
                            Senha
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </div>
                            <input type="password" id="senha" placeholder="••••••••" required
                                class="w-full bg-black/40 border border-gray-800 rounded-xl pl-11 pr-4 py-3.5 text-sm text-white focus:border-[#f97316]/60 outline-none transition-all placeholder-gray-600">
                        </div>
                    </div>

                    <button type="submit" id="btn-login"
                        class="w-full bg-[#f97316] hover:bg-[#ea580c] text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest shadow-[0_10px_25px_rgba(249,115,22,0.3)] transition-all hover:scale-[1.02] active:scale-[0.98]">
                        Entrar
                    </button>

                    <div id="msg-erro" class="hidden text-center">
                        <p class="text-red-400 text-xs font-semibold"></p>
                    </div>
                </form>

                <div class="flex items-center my-6">
                    <div class="flex-1 border-t border-gray-800"></div>
                    <span class="px-4 text-[10px] text-gray-600 font-bold uppercase tracking-widest">ou</span>
                    <div class="flex-1 border-t border-gray-800"></div>
                </div>

                <button type="button" onclick="Auth.modoDemo()"
                    class="w-full bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-500 hover:to-red-500 text-white font-black py-3.5 rounded-xl text-xs uppercase tracking-widest transition-all shadow-lg shadow-orange-900/30">
                    <a href="demo.html" class="text-white no-underline">🎓 Modo Apresentação (Demo)</a>
                </button>

                <p class="text-center text-gray-600 text-sm mt-6">
                    Não tem uma conta?
                    <a href="cadastro.html"
                        class="text-[#f97316] hover:text-[#ea580c] font-bold transition-colors ml-1">
                        Criar conta
                    </a>
                </p>

            </div>
        </div>
    </main>

    <footer class="w-full text-center py-6 border-t border-gray-800/50">
        <p class="text-xs font-semibold text-gray-700 tracking-widest uppercase">EditMind © 2026</p>
    </footer>

    <script src="js/config.js"
        onerror="alert('CRÍTICO: Ficheiro js/config.js não encontrado. Verifique a sua pasta!')"></script>
    <script src="js/auth.js"></script>
    <script>
        if (typeof Auth !== 'undefined') {
            if (Auth.estaLogado()) window.location.href = 'index.html';

            document.getElementById('form-login').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btn-login');
                const erroDiv = document.getElementById('msg-erro');
                const erroP = erroDiv.querySelector('p');

                btn.disabled = true;
                btn.textContent = 'Entrando...';
                erroDiv.classList.add('hidden');

                const email = document.getElementById('email').value;
                const senha = document.getElementById('senha').value;

                const resultado = await Auth.login(email, senha);

                if (resultado.sucesso) {
                    window.location.href = 'index.html';
                } else {
                    erroP.textContent = resultado.erro || 'Erro ao fazer login.';
                    erroDiv.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Entrar';
                }
            });
        }
    </script>
</body>

</html>
