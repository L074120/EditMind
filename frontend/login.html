<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditMind — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-[#0b0d11] text-gray-100 min-h-screen flex flex-col">

    <header class="w-full flex justify-between items-center px-6 md:px-12 py-8 z-20">
        <a href="home.html" class="no-underline hover:scale-105 transition-transform inline-block">
            <h1 class="text-3xl font-black italic tracking-tighter text-white">
                EDIT<span class="text-[#f97316] drop-shadow-[0_0_15px_rgba(249,115,22,0.5)]">MIND</span>
            </h1>
        </a>
        <a href="cadastro.html"
           class="text-xs font-black uppercase tracking-widest text-gray-400 hover:text-white border border-gray-700 hover:border-gray-500 px-5 py-2.5 rounded-full transition-all">
            Criar conta
        </a>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md">

            <div class="glass rounded-[2rem] p-8 md:p-12 border border-gray-800">

                <div class="text-center mb-8">
                    <h2 class="text-2xl md:text-3xl font-black text-white tracking-tight mb-2">
                        Bem-vindo de volta
                    </h2>
                    <p class="text-gray-500 text-sm">Entre para acessar seus projetos</p>
                </div>

                <form id="form-login" class="space-y-5">

                    <!-- E-mail -->
                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">
                            E-mail
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                </svg>
                            </div>
                            <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email"
                                class="w-full bg-black/40 border border-gray-800 rounded-xl pl-11 pr-4 py-3.5 text-sm text-white focus:border-[#f97316]/60 outline-none transition-all placeholder-gray-600">
                        </div>
                    </div>

                    <!-- Senha -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest">
                                Senha
                            </label>
                            <!-- Link Esqueci minha senha -->
                            <a href="esqueci-senha.html"
                               class="text-[10px] text-gray-500 hover:text-[#f97316] font-bold transition-colors uppercase tracking-widest">
                                Esqueci a senha
                            </a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                </svg>
                            </div>
                            <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password"
                                class="w-full bg-black/40 border border-gray-800 rounded-xl pl-11 pr-4 py-3.5 text-sm text-white focus:border-[#f97316]/60 outline-none transition-all placeholder-gray-600">
                        </div>
                    </div>

                    <button type="submit" id="btn-login"
                        class="w-full bg-[#f97316] hover:bg-[#ea580c] text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest shadow-[0_10px_25px_rgba(249,115,22,0.3)] transition-all hover:scale-[1.02] active:scale-[0.98]">
                        Entrar
                    </button>

                    <div id="msg-erro" class="hidden text-center">
                        <p class="text-red-400 text-xs font-semibold"></p>
                    </div>
                </form>
                <p class="text-center text-gray-600 text-sm mt-6">
                    Não tem uma conta?
                    <a href="cadastro.html" class="text-[#f97316] hover:text-[#ea580c] font-bold transition-colors ml-1">
                        Criar conta
                    </a>
                </p>
            </div>
        </div>
    </main>

    <footer class="w-full text-center py-6 border-t border-gray-800/50">
        <p class="text-xs font-semibold text-gray-700 tracking-widest uppercase">EditMind © 2026</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (typeof Auth !== 'undefined' && Auth.estaLogado()) {
            window.location.href = 'index.html';
        }

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn    = document.getElementById('btn-login');
            const erroEl = document.getElementById('msg-erro');
            const erroP  = erroEl.querySelector('p');

            btn.disabled    = true;
            btn.textContent = 'Entrando...';
            erroEl.classList.add('hidden');

            const res = await Auth.login(
                document.getElementById('email').value,
                document.getElementById('senha').value
            );

            if (res.sucesso) {
                window.location.href = 'index.html';
            } else {
                erroP.textContent = res.erro || 'Erro ao fazer login.';
                erroEl.classList.remove('hidden');
                btn.disabled    = false;
                btn.textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
